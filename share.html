<script>
        const SUPABASE_URL = "https://zfstezwsryqxrqrqovqy.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpmc3RlendzcnlxeHJxcnFvdnF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5Mzc0ODAsImV4cCI6MjA5NTUxMzQ4MH0.bsuO_DusCOzTA7NGlPSRXwKHKLtoSADV0YgvDOxhtOA";
        
        // Declared exactly ONCE here
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = async () => {
            // Get the unique passport ID from the web link URL parameter (?id=...)
            const urlParams = new URLSearchParams(window.location.search);
            const passportId = urlParams.get('id');

            if (!passportId) {
                showError();
                return;
            }

            // Fetch info publicly using the safe RLS policy we set up
            const { data, error } = await supabase
                .from('passports')
                .select('sensitivities, notes')
                .eq('id', passportId)
                .single();

            if (error || !data) {
                showError();
                return;
            }

            // Render tags
            const tagsContainer = document.getElementById('tags');
            tagsContainer.innerHTML = '';
            if (data.sensitivities && data.sensitivities.length > 0) {
                data.sensitivities.forEach(tagText => {
                    const tagObj = document.createElement('span');
                    tagObj.className = 'tag';
                    tagObj.innerText = tagText;
                    tagsContainer.appendChild(tagObj);
                });
            } else {
                tagsContainer.innerHTML = '<span style="color:#718096; font-style:italic;">No sensitivities highlighted.</span>';
            }

            // Render notes
            document.getElementById('notes').innerText = data.notes || 'No specific accommodation notes listed.';
        };

        function showError() {
            document.getElementById('content').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }
    </script>
